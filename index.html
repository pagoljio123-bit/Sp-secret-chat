<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secret Braille Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0a0a0a;
            color: #00ffcc;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 15px;
            background: #111;
            border-bottom: 2px solid #00ffcc;
            box-shadow: 0 0 10px #00ffcc55;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            overflow-y: auto;
        }

        .box {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px;
            position: relative;
            box-shadow: inset 0 0 10px #000;
        }

        .box label {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #444;
        }

        #brailleText {
            font-size: 24px;
            letter-spacing: 2px;
            color: #00ffcc;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #00ffcc;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:active {
            transform: scale(0.95);
            background: #00b38f;
        }

        button.clear-btn {
            background: #ff3366;
            color: white;
        }

        button.clear-btn:active {
            background: #cc0033;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="header">
        Secret Gateway
    </div>

    <div class="container">
        <div class="box">
            <label><span>Normal Text</span></label>
            <textarea id="normalText" placeholder="а¶Па¶Ца¶Ња¶®аІЗ а¶ЃаІЗа¶ЄаІЗа¶Ь а¶≤а¶ња¶ЦаІБа¶® (а¶ђа¶Ња¶Ва¶≤а¶Њ а¶ђа¶Њ а¶За¶Ва¶∞аІЗа¶Ьа¶њ)..."></textarea>
            <div class="btn-group">
                <button onclick="copyText('normalText')">Copy Text</button>
                <button class="clear-btn" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <div class="box">
            <label><span>Secret Code</span></label>
            <textarea id="brailleText" placeholder="в†Ув†Св†Чв†С..."></textarea>
            <div class="btn-group">
                <button onclick="copyText('brailleText')">Copy Code</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
        // Combined Dictionary for English and Bengali
        const brailleMap = {
            // English and Basic Symbols (Standard 6-dot Braille)
            'a': 'в†Б', 'b': 'в†Г', 'c': 'в†Й', 'd': 'в†Щ', 'e': 'в†С', 'f': 'в†Л', 'g': 'в†Ы', 'h': 'в†У',
            'i': 'в†К', 'j': 'в†Ъ', 'k': 'в†Е', 'l': 'в†З', 'm': 'в†Н', 'n': 'в†Э', 'o': 'в†Х', 'p': 'в†П',
            'q': 'в†Я', 'r': 'в†Ч', 's': 'в†О', 't': 'в†Ю', 'u': 'в†•', 'v': 'в†І', 'w': 'в†Ї', 'x': 'в†≠',
            'y': 'в†љ', 'z': 'в†µ', '0': 'в†і', '1': 'в†В', '2': 'в†Ж', '3': 'в†Т', '4': 'в†≤', '5': 'в†Ґ',
            '6': 'в†Ц', '7': 'в†ґ', '8': 'в†¶', '9': 'в†Ф', ' ': ' ', '.': 'в†®', ',': 'в††', '?': 'в†є',
            '!': 'в†Ѓ', '\n': '\n',

            // Bengali Vowels (Using 8-dot Braille for uniqueness)
            'а¶Е': 'в°А', 'а¶Ж': 'в°Б', 'а¶З': 'в°В', 'а¶И': 'в°Г', 'а¶Й': 'в°Д', 'а¶К': 'в°Е', 'а¶Л': 'в°Ж', 'а¶П': 'в°З', 'а¶Р': 'в°И', 'а¶У': 'в°Й', 'а¶Ф': 'в°К',
            
            // Bengali Consonants
            'а¶Х': 'в°Л', 'а¶Ц': 'в°М', 'а¶Ч': 'в°Н', 'а¶Ш': 'в°О', 'а¶Щ': 'в°П', 'а¶Ъ': 'в°Р', 'а¶Ы': 'в°С', 'а¶Ь': 'в°Т', 'а¶Э': 'в°У', 'а¶Ю': 'в°Ф',
            'а¶Я': 'в°Х', 'а¶†': 'в°Ц', 'а¶°': 'в°Ч', 'а¶Ґ': 'в°Ш', 'а¶£': 'в°Щ', 'а¶§': 'в°Ъ', 'а¶•': 'в°Ы', 'а¶¶': 'в°Ь', 'а¶І': 'в°Э', 'а¶®': 'в°Ю',
            'а¶™': 'в°Я', 'а¶Ђ': 'в°†', 'а¶ђ': 'в°°', 'а¶≠': 'в°Ґ', 'а¶Ѓ': 'в°£', 'а¶ѓ': 'в°§', 'а¶∞': 'в°•', 'а¶≤': 'в°¶', 'а¶ґ': 'в°І', 'а¶Ј': 'в°®',
            'а¶Є': 'в°©', 'а¶є': 'в°™', 'а¶°а¶Љ': 'в°Ђ', 'а¶Ґа¶Љ': 'в°ђ', 'а¶ѓа¶Љ': 'в°≠', 'аІО': 'в°Ѓ',
            
            // Bengali Modifiers (Kar, Hasant, etc.)
            'а¶Њ': 'в°ѓ', 'а¶њ': 'в°∞', 'аІА': 'в°±', 'аІБ': 'в°≤', 'аІВ': 'в°≥', 'аІГ': 'в°і', 'аІЗ': 'в°µ', 'аІИ': 'в°ґ', 'аІЛ': 'в°Ј', 'аІМ': 'в°Є',
            'а¶В': 'в°є', 'а¶Г': 'в°Ї', 'а¶Б': 'в°ї', 'аІН': 'в°Љ', 'а•§': 'в°љ'
        };

        // Create reverse dictionary
        const reverseMap = {};
        for (let key in brailleMap) {
            reverseMap[brailleMap[key]] = key;
        }

        const normalBox = document.getElementById('normalText');
        const brailleBox = document.getElementById('brailleText');

        // Translate Normal (Bangla/English) to Braille
        normalBox.addEventListener('input', function() {
            let text = this.value;
            let result = '';
            for (let i = 0; i < text.length; i++) {
                // Convert English to lowercase to match dictionary, leave Bengali as is
                let charToMatch = text[i].match(/[a-zA-Z]/) ? text[i].toLowerCase() : text[i];
                result += brailleMap[charToMatch] !== undefined ? brailleMap[charToMatch] : text[i];
            }
            brailleBox.value = result;
        });

        // Translate Braille to Normal
        brailleBox.addEventListener('input', function() {
            let text = this.value;
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += reverseMap[text[i]] !== undefined ? reverseMap[text[i]] : text[i];
            }
            normalBox.value = result;
        });

        // Copy Function
        function copyText(elementId) {
            const textArea = document.getElementById(elementId);
            if(textArea.value.trim() === "") return;
            
            textArea.select();
            document.execCommand('copy');
            
            // Deselect
            window.getSelection().removeAllRanges();

            // Show Toast
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Clear Function
        function clearAll() {
            normalBox.value = '';
            brailleBox.value = '';
        }
    </script>

</body>
</html>
